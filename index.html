    <meta name="robots" content="index, follow, noai, noimageai" />

    <meta name="twitter:image" content="https://splittank.com/preview-v4.png" />

    <!-- Structured data: tells Google which image is the site logo -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Split Tank",
      "url": "https://splittank.com",
      "description": "No more gas debates on road trips. Split Tank calculates everyone's exact share — live pump prices, your car's real MPG, tolls auto-estimated, and EV support. Free.",
      "publisher": {
        "@type": "Organization",
        "name": "Split Tank",
        "url": "https://splittank.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://splittank.com/logo-512.png",
          "width": 512,
          "height": 512
        }
      }
    }
    </script>
